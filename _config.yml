title: Dr. Kembhavi's Ayurveda Unfiltered Blog
description: A critical insider's perspective on Ayurvedic research, education, and epistemology.
author: Dr Aakash Kembhavi, MD, PGDMLS, MS(Counseling & Psychotherapy)
email: drkembhavi@live.com

# Navigation menu
header_pages:
  - about.md
  - categories.md
  - publications.md

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed

# Site settings
baseurl: ""
url: "https://DrKembhavi-s.github.io"

# Permalink — date and title only, no categories in URL
permalink: /:year/:month/:day/:title:output_ext

# Custom CSS Configuration
sass:
  style: compressed
  sass_dir: _sass

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Dr Kembhavi"
      permalink: /:year/:month/:day/:title:output_ext
  - scope:
      path: "assets/css"
    values:
      sitemap: false
